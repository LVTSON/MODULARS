<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODULAR</title>
    <!-- embed reset css -->
    <link rel="stylesheet" href="./assets/css/reset.css">
    <!-- embed css -->
    <link rel="stylesheet" href="./assets/css/styles.css">
    <!-- embed font poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- embed font Public Sans -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- embed font Sonsie One -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sonsie+One&display=swap" rel="stylesheet">
    <!-- embed favicon -->
     <link rel="apple-touch-icon" sizes="57x57" href="./assets/favicon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="./assets/favicon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="./assets/favicon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="./assets/favicon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="./assets/favicon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="./assets/favicon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="./assets/favicon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./assets/favicon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="./assets/favicon/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="./assets/favicon/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/favicon/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="./assets/favicon/ms-icon-310x310.png">
    <meta name="theme-color" content="#ffffff">

</head>
<body>
    <div class="main">
        <header class="header">
            <div class="container">
                <!-- header top -->
                <div class="header__top">
                    <!-- logo -->
                    <div class="header__top--logo">
                        <figure>
                            <img src="./assets/img/moduler-logo.png" alt="logo" class="header__logo">
                        </figure>
                        <span class="header__top--name">MODULARS</span>
                    </div>
                    <!-- navigation -->
                    <div class="header__top--nav">
                        <ul class="header__list">
                            <li class="header__items">
                                <a href="#!" class="header__link">
                                    Home
                                </a>
                            </li>
                            <li class="header__items">
                                <a href="#!" class="header__link">
                                    About
                                </a>
                            </li>
                            <li class="header__items">
                                <a href="#!" class="header__link">
                                    Blog
                                </a>
                            </li>
                            <li class="header__items">
                                <a href="#!" class="header__link">
                                    Contact
                                </a>
                            </li>
                        </ul>
                        <a href="#!" class="btn header__btn">
                            Sign Up
                        </a>
                    </div>
                </div> 
                <span class="line"></span>
                <!-- header body -->
                <div class="header__body">
                    <!-- header body heading  -->
                    <div class="header__body--content">
                        <h1 class="header__content--heading">
                            We’re a creative design agency.
                        </h1>
                        <p class="header__content--desc">
                            A brilliant, modular agency template for startup’s build yours toady.
                        </p>
                        <div class="header__content--button">
                            <button class="btn Get-in-touch">
                                Get in touch
                            </button>
                            <div class="header__button--Watch-Video">
                                <div class="header__button--icon">
                                    <span class="header__button--circle"></span>
                                    <img src="./assets/img/header-button-play.png" alt="play" class="header__button--playicon">
                                </div>
                                <span class="header__button--text">
                                    Watch Video
                                </span>
                            </div>
                        </div>
                    </div>
                    <!-- header body images -->
                     <figure class="header__body--images">
                        <img src="./assets/img/header__body-1.jpg" alt="img1" class="header__body--img">
                        <img src="./assets/img/header__body-2.jpg" alt="img2" class="header__body--img">
                        <img src="./assets/img/header__body-3.jpg" alt="img3" class="header__body--img">
                     </figure>
                </div>
                <!-- logo-branch -->
                <div class="header__logo-branch">
                    <span class="header__logo--Google">
                        Google
                    </span>
                    <div class="logo__name--item">
                        <img src="./assets/img/slack.png" alt="slack">
                        <span class="header__logo--slack">
                            slack
                        </span>
                    </div>
                    <div class="logo__name--item">
                        <img src="./assets/img/agworld.png" alt="agworld">
                        <span class="header__logo--Agworld">
                            Agworld
                        </span>
                    </div>
                    <span class="header__logo--RioTinto">
                        RioTinto                        
                    </span>
                    <div class="logo__name--item">
                        <img src="./assets/img/heroku.png" alt="heroku icon">
                        <span class="header__logo--HEROKU">
                            HEROKU
                        </span>
                    </div>
                </div>

            </div>
        </header>
    </div>
</body>
</html>
